<!DOCTYPE html>
<html>
<head>
    <title>Finance AI Agent</title>
    <style>
        body {
            font-family: Arial;
            background: #0b1a2f;
            color: white;
            text-align: center;
            padding: 40px;
        }

        input {
            width: 400px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        .card {
            background: #1e2f4d;
            margin: 20px auto;
            padding: 15px;
            width: 300px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>💰 Finance AI Agent</h1>

    <input id="query" placeholder="Enter finance query">
    <button onclick="analyze()">Analyze</button>

    <div id="result"></div>

    <script>
        async function analyze() {
            const query = document.getElementById("query").value;
            const resultDiv = document.getElementById("result");

            resultDiv.innerHTML = "⏳ Analyzing...";

            try {
                const response = await fetch("https://finance-api-a44e.onrender.com/analyze", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ query })
                });

                const data = await response.json();

                if (data.results) {
                    resultDiv.innerHTML = "";

                    data.results.forEach(r => {
                        resultDiv.innerHTML += `
                            <div class="card">
                                <h3>${r.metric}</h3>
                                <p><b>Value:</b> ${r.value}%</p>
                                <p><b>Formula:</b> ${r.formula}</p>
                            </div>
                        `;
                    });

                } else {
                    resultDiv.innerHTML = "❌ Could not understand input";
                }

            } catch (error) {
                resultDiv.innerHTML = "❌ API Error";
            }
        }
    </script>

</body>
</html>
